<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; padding: 0; background: transparent; font-family: sans-serif; }
  .compass-wrap { display: flex; align-items: center; gap: 16px; user-select: none; }
  .compass-container {
    position: relative; width: 160px; height: 160px; cursor: grab;
  }
  .compass-container:active { cursor: grabbing; }
  svg { width: 100%; height: 100%; }
  .angle-label {
    font-size: 14px; color: #ccc; text-align: center; margin-top: 4px;
  }
  .angle-value { font-size: 22px; font-weight: bold; color: #fff; }
  .direction-name { font-size: 13px; color: #aaa; }
</style>
</head>
<body>
<div class="compass-wrap">
  <div>
    <div class="compass-container" id="compass">
      <svg viewBox="0 0 200 200">
        <!-- Outer ring -->
        <circle cx="100" cy="100" r="90" fill="none" stroke="#555" stroke-width="2"/>
        <circle cx="100" cy="100" r="88" fill="none" stroke="#333" stroke-width="1"/>

        <!-- Tick marks -->
        <g id="ticks"></g>

        <!-- Cardinal labels -->
        <text x="100" y="22" text-anchor="middle" fill="#ff6b35" font-size="14" font-weight="bold">N</text>
        <text x="100" y="190" text-anchor="middle" fill="#ccc" font-size="12">S</text>
        <text x="188" y="104" text-anchor="middle" fill="#ccc" font-size="12">E</text>
        <text x="12" y="104" text-anchor="middle" fill="#ccc" font-size="12">W</text>

        <!-- Center dot -->
        <circle cx="100" cy="100" r="5" fill="#666"/>

        <!-- Needle group (rotated) -->
        <g id="needle" transform="rotate(0, 100, 100)">
          <!-- North half (red) -->
          <polygon points="100,28 94,100 106,100" fill="#e8490f" opacity="0.9"/>
          <!-- South half (gray) -->
          <polygon points="100,172 94,100 106,100" fill="#666" opacity="0.7"/>
          <!-- Center cap -->
          <circle cx="100" cy="100" r="6" fill="#888" stroke="#555" stroke-width="1"/>
        </g>
      </svg>
    </div>
    <div class="angle-label" id="label"></div>
  </div>
  <div>
    <div class="angle-value" id="angleDisplay">0°</div>
    <div class="direction-name" id="dirName">北 (N)</div>
  </div>
</div>

<script>
// Generate tick marks
const ticksGroup = document.getElementById('ticks');
for (let i = 0; i < 360; i += 10) {
  const isMajor = i % 90 === 0;
  const isMinor45 = i % 45 === 0;
  const r1 = isMajor ? 72 : (isMinor45 ? 76 : 80);
  const r2 = 88;
  const rad = (i - 90) * Math.PI / 180;
  const x1 = 100 + r1 * Math.cos(rad);
  const y1 = 100 + r1 * Math.sin(rad);
  const x2 = 100 + r2 * Math.cos(rad);
  const y2 = 100 + r2 * Math.sin(rad);
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', x1);
  line.setAttribute('y1', y1);
  line.setAttribute('x2', x2);
  line.setAttribute('y2', y2);
  line.setAttribute('stroke', isMajor ? '#ff6b35' : '#555');
  line.setAttribute('stroke-width', isMajor ? '2' : '1');
  ticksGroup.appendChild(line);
}

const compass = document.getElementById('compass');
const needle = document.getElementById('needle');
const angleDisplay = document.getElementById('angleDisplay');
const dirName = document.getElementById('dirName');
let currentAngle = 0;
let isDragging = false;

const DIRECTIONS = [
  [0, '北 (N)'], [45, '北東 (NE)'], [90, '東 (E)'], [135, '南東 (SE)'],
  [180, '南 (S)'], [225, '南西 (SW)'], [270, '西 (W)'], [315, '北西 (NW)']
];

function getDirection(angle) {
  let closest = DIRECTIONS[0];
  let minDiff = 360;
  for (const [deg, name] of DIRECTIONS) {
    let diff = Math.abs(angle - deg);
    if (diff > 180) diff = 360 - diff;
    if (diff < minDiff) { minDiff = diff; closest = [deg, name]; }
  }
  return closest[1];
}

function updateAngle(angle) {
  angle = ((angle % 360) + 360) % 360;
  angle = Math.round(angle);
  currentAngle = angle;
  needle.setAttribute('transform', `rotate(${angle}, 100, 100)`);
  angleDisplay.textContent = `${angle}°`;
  dirName.textContent = getDirection(angle);
  // Send to Streamlit
  if (window.parent && window.parent.postMessage) {
    window.Streamlit && window.Streamlit.setComponentValue(angle);
  }
}

function getAngleFromEvent(e) {
  const rect = compass.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  let angle = Math.atan2(clientX - cx, -(clientY - cy)) * 180 / Math.PI;
  return ((angle % 360) + 360) % 360;
}

compass.addEventListener('mousedown', (e) => { isDragging = true; updateAngle(getAngleFromEvent(e)); });
compass.addEventListener('touchstart', (e) => { isDragging = true; updateAngle(getAngleFromEvent(e)); e.preventDefault(); });
document.addEventListener('mousemove', (e) => { if (isDragging) updateAngle(getAngleFromEvent(e)); });
document.addEventListener('touchmove', (e) => { if (isDragging) updateAngle(getAngleFromEvent(e)); });
document.addEventListener('mouseup', () => { isDragging = false; });
document.addEventListener('touchend', () => { isDragging = false; });

// Streamlit component communication
function onRender(event) {
  const data = event.detail;
  if (data.args && data.args.value !== undefined) {
    updateAngle(data.args.value);
  }
  window.Streamlit.setFrameHeight(180);
}

// Wait for Streamlit to be ready
function waitForStreamlit() {
  if (window.Streamlit) {
    window.Streamlit.events.addEventListener(window.Streamlit.RENDER_EVENT, onRender);
    window.Streamlit.setComponentReady();
    window.Streamlit.setFrameHeight(180);
  } else {
    setTimeout(waitForStreamlit, 100);
  }
}
waitForStreamlit();
</script>
</body>
</html>
